# ── docker-compose.yml ───────────────────────────────────────────────────
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Services are exposed at http://localhost:8080 (frontend) and
# http://localhost:8000 (backend).  The frontend container proxies
# API requests to the backend automatically via nginx.
#
# PostgreSQL and Redis are optional — uncomment their blocks and set
# the corresponding environment variables in backend/.env.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - backend_data:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

