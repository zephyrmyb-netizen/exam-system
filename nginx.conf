server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression for assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API proxy - forward API calls to the backend service
    location ~ ^/(health|auth|questions|courses|practice|wrongbook|imports|library|chat|exams|admin|tags|recommendations|analytics|exports|bookmarks)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # Static assets with content hashes - cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
