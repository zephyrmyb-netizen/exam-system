# ── docker-compose.prod.yml ────────────────────────────────────────────────
# Production deployment with PostgreSQL and Redis.
# Start: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Unlike the base compose file which uses SQLite, this enables:
# - PostgreSQL for concurrent access and production reliability
# - Redis for accurate rate limiting across workers

services:
  backend:
    environment:
      - DATABASE_URL=postgresql://xuexibao_user:${DB_PASSWORD:?set DB_PASSWORD}@postgres:5432/xuexibao
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY}
      - INVITE_CODE=${INVITE_CODE:?set INVITE_CODE}
      - CORS_ORIGINS=${CORS_ORIGINS:?set CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xuexibao_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: xuexibao
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xuexibao_user -d xuexibao"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
