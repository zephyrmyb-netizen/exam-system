name: Security Check

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run security check
        run: python scripts/security_check.py
